<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ボードゲームパラダイス 会員システム 紹介資料（案A）</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Inter:wght@400;600;700;800;900&family=Noto+Serif+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #1a1715; overflow: hidden; font-family: 'M PLUS Rounded 1c', system-ui, sans-serif; height: 100%; }
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .slide {
    width: 1600px; height: 900px;
    background: #fff;
    transform-origin: center center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    position: relative;
    overflow: hidden;
    border-radius: 4px;
  }
  .nav-btn {
    position: fixed;
    top: 50%;
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 22px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.22); }
  .nav-prev { left: 20px; transform: translateY(-50%); }
  .nav-next { right: 20px; transform: translateY(-50%); }
  .counter {
    position: fixed;
    bottom: 18px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    background: rgba(0,0,0,0.4);
    padding: 6px 14px;
    border-radius: 999px;
    backdrop-filter: blur(8px);
    z-index: 10;
    font-family: 'Inter', sans-serif;
  }
  .dots {
    position: fixed;
    bottom: 54px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px;
    z-index: 10;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.25);
    cursor: pointer;
    transition: background 0.15s, width 0.15s;
  }
  .dot.active { background: #E63946; width: 24px; border-radius: 4px; }
</style>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#E63946"/>
  <g transform="translate(30,30) rotate(-12 20 20)">
    <rect x="0" y="0" width="40" height="40" rx="7" fill="#F5D547"/>
    <circle cx="10" cy="10" r="3.5" fill="#2A1810"/>
    <circle cx="30" cy="10" r="3.5" fill="#2A1810"/>
    <circle cx="10" cy="30" r="3.5" fill="#2A1810"/>
    <circle cx="30" cy="30" r="3.5" fill="#2A1810"/>
    <circle cx="20" cy="20" r="3.5" fill="#2A1810"/>
  </g>
</svg>
</template>
</head>
<body>
<div class="stage"><div id="slide-host" class="slide"></div></div>
<button class="nav-btn nav-prev" id="prev" aria-label="前へ">‹</button>
<button class="nav-btn nav-next" id="next" aria-label="次へ">›</button>
<div class="dots" id="dots"></div>
<div class="counter" id="counter">1 / 9</div>

<script type="text/babel" src="slides/shared.jsx"></script>
<script type="text/babel" src="slides/deckA.jsx"></script>
<script type="text/babel">
  const slides = [ASlide1, ASlide2, ASlide3, ASlide4, ASlide4b, ASlide5, ASlide5b, ASlide6, ASlide7];
  const root = ReactDOM.createRoot(document.getElementById('slide-host'));

  function fit() {
    const stage = document.querySelector('.stage');
    const host = document.getElementById('slide-host');
    const sx = stage.clientWidth / 1600;
    const sy = stage.clientHeight / 900;
    const s = Math.min(sx, sy) * 0.94;
    host.style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  fit();

  // ドット生成
  const dotsEl = document.getElementById('dots');
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot';
    d.addEventListener('click', () => show(i));
    dotsEl.appendChild(d);
  });

  let idx = parseInt(localStorage.getItem('dist_idx_a') || '0', 10) || 0;
  function show(i) {
    idx = Math.max(0, Math.min(slides.length - 1, i));
    localStorage.setItem('dist_idx_a', String(idx));
    root.render(React.createElement(slides[idx]));
    document.getElementById('counter').textContent = `${idx + 1} / ${slides.length}`;
    [...dotsEl.children].forEach((el, k) => el.classList.toggle('active', k === idx));
  }
  window.goToSlide = show;
  show(idx);

  document.getElementById('prev').addEventListener('click', () => show(idx - 1));
  document.getElementById('next').addEventListener('click', () => show(idx + 1));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { show(idx + 1); e.preventDefault(); }
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') { show(idx - 1); e.preventDefault(); }
  });
</script>
</body>
</html>
