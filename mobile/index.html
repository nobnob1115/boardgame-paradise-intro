<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ボードゲームパラダイス — スマホ縦画面版</title>
<script>
  (function () {
    try {
      var params = new URLSearchParams(location.search);
      if (params.has('mobile')) return; // ?mobile=1 でスマホ版を強制表示
      var ua = navigator.userAgent;
      var isMobileUA = /Android|iPhone|iPod|Mobile|Windows Phone/i.test(ua)
                    || (/\bMacintosh\b/.test(ua) && 'ontouchend' in document); // iPadOS
      var isNarrow = window.matchMedia('(max-width: 820px)').matches;
      if (!isMobileUA && !isNarrow) {
        location.replace('../' + location.search + location.hash);
      }
    } catch (e) {}
  })();
</script>
<link rel="canonical" href="./">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at top, #2A1810 0%, #0e0907 70%);
    min-height: 100vh;
    font-family: 'M PLUS Rounded 1c', system-ui, sans-serif;
    color: #2A1810;
    overscroll-behavior: none;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }

  /* フォントスケール (tweaks) */
  :root { --m-fs-heading: 1; --m-fs-body: 1; }
  .m-fontscale-heading { font-size: calc(var(--m-fs-base-heading, 40px) * var(--m-fs-heading)) !important; }

  /* スマホ外枠 */
  .phone-shell {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 30px 20px;
  }
  .phone-frame {
    width: 390px; height: 844px;
    background: #0a0a0a;
    border-radius: 54px;
    padding: 12px;
    box-shadow: 0 0 0 2px #1a1a1a, 0 40px 80px rgba(0,0,0,0.5), 0 0 100px rgba(230,57,70,0.12);
    position: relative;
    flex-shrink: 0;
  }
  .phone-screen {
    width: 100%; height: 100%;
    background: #FFF3E6;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
  }
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 47px; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px 0;
    font-family: -apple-system, 'SF Pro', system-ui;
    font-weight: 600; font-size: 15px;
    pointer-events: none;
  }
  .notch {
    position: absolute; top: 11px; left: 50%; transform: translateX(-50%);
    width: 120px; height: 34px; background: #000; border-radius: 20px; z-index: 101;
  }
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; background: #000; opacity: 0.3; border-radius: 3px; z-index: 101;
    pointer-events: none;
  }

  /* スワイプ領域 */
  .swipe-viewport {
    width: 100%; height: 100%;
    overflow: hidden; position: relative;
    touch-action: pan-y;
  }
  .swipe-track {
    height: 100%;
    display: flex; flex-direction: column;
    transition: transform 0.55s cubic-bezier(0.32, 0.72, 0, 1);
    will-change: transform;
  }
  .swipe-slide {
    width: 100%; height: 100%; flex-shrink: 0; position: relative;
  }

  /* ドットナビ */
  .dot-nav {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 7px; z-index: 90;
    padding: 8px 14px; background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); border-radius: 999px;
    pointer-events: none;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; background: rgba(42,24,16,0.3);
    transition: all 0.3s ease;
  }
  .dot.active { background: #E63946; width: 22px; border-radius: 4px; }

  /* Tweaks パネル */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px;
    width: 280px; background: #fff; border-radius: 16px;
    padding: 18px 20px 20px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25), 0 4px 12px rgba(0,0,0,0.1);
    border: 2px solid #2A1810;
    z-index: 1000;
    font-family: 'M PLUS Rounded 1c', system-ui;
    color: #2A1810;
  }
  .tweaks-panel h3 {
    margin: 0 0 14px; font-size: 14px; font-weight: 900;
    letter-spacing: 0.12em;
    display: flex; align-items: center; gap: 8px;
  }
  .tweak-row { margin-bottom: 14px; }
  .tweak-row:last-child { margin-bottom: 0; }
  .tweak-label { font-size: 11px; font-weight: 800; opacity: 0.7; margin-bottom: 6px; letter-spacing: 0.04em; }
  .tweak-btns { display: flex; gap: 4px; }
  .tweak-btn {
    flex: 1; padding: 8px 4px; font-size: 12px; font-weight: 800;
    border: 2px solid #2A1810; background: #fff; color: #2A1810;
    border-radius: 8px; cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .tweak-btn.active { background: #E63946; color: #fff; }
  .tweak-btn:hover:not(.active) { background: #FFF3E6; }

  .hint {
    position: fixed; top: 20px; left: 20px; color: rgba(255,255,255,0.55);
    font-size: 12px; font-family: ui-monospace, Menlo, monospace;
    pointer-events: none;
  }
  @media (max-width: 500px) {
    .tweaks-panel { display: none; }
    .hint { display: none; }
    .phone-shell { padding: 0; }
    .phone-frame {
      width: 100vw; height: 100vh;
      border-radius: 0; padding: 0;
      box-shadow: none;
    }
    .phone-screen { border-radius: 0; }
    .notch { display: none; }
    .status-bar { display: none; }
  }
</style>
</head>
<body>
<div class="hint">↕ 上下スワイプ または ↑↓キーでスライド送り</div>
<div id="root"></div>
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#E63946"/>
  <g transform="translate(30,30) rotate(-12 20 20)">
    <rect x="0" y="0" width="40" height="40" rx="7" fill="#FCBF49"/>
    <circle cx="10" cy="10" r="3.5" fill="#2A1810"/>
    <circle cx="30" cy="10" r="3.5" fill="#2A1810"/>
    <circle cx="10" cy="30" r="3.5" fill="#2A1810"/>
    <circle cx="30" cy="30" r="3.5" fill="#2A1810"/>
    <circle cx="20" cy="20" r="3.5" fill="#2A1810"/>
  </g>
</svg>
</template>
<script type="text/babel" src="mobile/slides.jsx"></script>
<script type="text/babel">
  const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
    "fontScale": "normal",
    "density": "normal",
    "featureCount": 6
  }/*EDITMODE-END*/;

  const SLIDES = [MSlide1, MSlide2, MSlide3, MSlide4, MSlide5, MSlide6, MSlide7, MSlide8, MSlide9];

  function applyTweaks(t) {
    window.__MOBILE_TWEAKS = t;
    const scale = { small: 0.85, normal: 1, large: 1.15 }[t.fontScale] || 1;
    document.documentElement.style.setProperty('--m-fs-heading', scale);
    document.documentElement.style.setProperty('--m-fs-body', scale);
  }

  function App() {
    const [tweaks, setTweaks] = React.useState(() => {
      try {
        const saved = localStorage.getItem('bp-mobile-tweaks');
        return saved ? { ...TWEAKS_DEFAULTS, ...JSON.parse(saved) } : TWEAKS_DEFAULTS;
      } catch { return TWEAKS_DEFAULTS; }
    });
    const [idx, setIdx] = React.useState(() => {
      try { return parseInt(localStorage.getItem('bp-mobile-idx') || '0') || 0; } catch { return 0; }
    });
    const touchStart = React.useRef(null);
    const trackRef = React.useRef(null);

    React.useEffect(() => { applyTweaks(tweaks); }, [tweaks]);
    React.useEffect(() => {
      try { localStorage.setItem('bp-mobile-idx', String(idx)); } catch {}
    }, [idx]);
    React.useEffect(() => {
      try { localStorage.setItem('bp-mobile-tweaks', JSON.stringify(tweaks)); } catch {}
    }, [tweaks]);

    const go = (n) => setIdx((i) => Math.max(0, Math.min(SLIDES.length - 1, i + n)));

    // キーボード
    React.useEffect(() => {
      const h = (e) => {
        if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
        if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      };
      window.addEventListener('keydown', h);
      return () => window.removeEventListener('keydown', h);
    }, []);

    // タッチスワイプ
    const onTouchStart = (e) => { touchStart.current = e.touches[0].clientY; };
    const onTouchEnd = (e) => {
      if (touchStart.current == null) return;
      const dy = e.changedTouches[0].clientY - touchStart.current;
      if (Math.abs(dy) > 50) go(dy < 0 ? 1 : -1);
      touchStart.current = null;
    };

    // ホイール (debounced)
    const wheelLock = React.useRef(false);
    const onWheel = (e) => {
      if (wheelLock.current) return;
      if (Math.abs(e.deltaY) < 20) return;
      wheelLock.current = true;
      go(e.deltaY > 0 ? 1 : -1);
      setTimeout(() => { wheelLock.current = false; }, 650);
    };

    const updateTweak = (k, v) => {
      setTweaks({ ...tweaks, [k]: v });
    };

    return (
      <div className="phone-shell">
        <div className="phone-frame">
          <div className="phone-screen">
            <div className="notch"></div>
            <div className="status-bar">
              <span>9:41</span>
              <span style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
                <svg width="17" height="10" viewBox="0 0 19 12"><rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill="#000"/><rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill="#000"/><rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill="#000"/><rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill="#000"/></svg>
                <svg width="25" height="11" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="#000" strokeOpacity="0.35" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill="#000"/></svg>
              </span>
            </div>
            <div className="swipe-viewport" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onWheel={onWheel}>
              <div className="swipe-track" ref={trackRef} style={{ transform: `translateY(${-idx * 100}%)` }}>
                {SLIDES.map((S, i) => (
                  <div className="swipe-slide" key={i}>
                    <S active={i === idx} />
                  </div>
                ))}
              </div>
            </div>
            <div className="dot-nav">
              {SLIDES.map((_, i) => (
                <div key={i} className={`dot ${i === idx ? 'active' : ''}`} />
              ))}
            </div>
            <div className="home-indicator"></div>
          </div>
        </div>

        {false && (
          <div className="tweaks-panel">
            <h3>⚙ Tweaks</h3>
            <div className="tweak-row">
              <div className="tweak-label">フォントサイズ</div>
              <div className="tweak-btns">
                {[['small','小'],['normal','中'],['large','大']].map(([v, l]) => (
                  <button key={v} className={`tweak-btn ${tweaks.fontScale === v ? 'active' : ''}`} onClick={() => updateTweak('fontScale', v)}>{l}</button>
                ))}
              </div>
            </div>
            <div className="tweak-row">
              <div className="tweak-label">密度</div>
              <div className="tweak-btns">
                {[['cozy','詰まり'],['normal','ゆったり']].map(([v, l]) => (
                  <button key={v} className={`tweak-btn ${tweaks.density === v ? 'active' : ''}`} onClick={() => updateTweak('density', v)}>{l}</button>
                ))}
              </div>
            </div>
            <div className="tweak-row">
              <div className="tweak-label">機能数（スライド3）</div>
              <div className="tweak-btns">
                {[4, 6].map((v) => (
                  <button key={v} className={`tweak-btn ${tweaks.featureCount === v ? 'active' : ''}`} onClick={() => updateTweak('featureCount', v)}>{v}個</button>
                ))}
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
